<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Marco Manvati (MarcusOrion)">
    <meta name="keywords" content="TikTok, Boolean, BoolTok, boolean_dancer">
    <title>BookTok</title>
    <!--CSS Sheet-->
    <link rel="stylesheet" href="./css/style.css">
    <!--Font Style-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sigmar&family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap" rel="stylesheet">
    <!--Icon Fonts-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
    <!-- Dove viene posizionato 'your tech partner'-->
    <header class="header">
        <i class="bi-chevron-left"></i>
        <h3>your tech partner</h3>
        <i class="bi-three-dots"></i>
    </header>
    <!-- Dove viene posizionato il logo, il nome e le conseguenti informazioni profilo -->
    <main>
        <section class="profile-box">
            <div class="logo">
                <img src="./img/boolean_logo.png" alt="Logo di Boolean"><br>
                <h3>@boolean_dancer</h3>
            </div>
        </section>
    <!-- Sezione di follower & info-->
     <section class="followers">
        <ul>
            <li>525<p>Following</p></li>
            <li>24.9K<p>Followers</p></li>
            <li>1.3M<p>Likes</p></li>
        </ul>
     </section>
        <section class="follow-btn">
            <button>Follow</button>
            <i class="bi-instagram"></i>
            <i class="bi-caret-down-fill"></i>
        </section>
    </main>
</body>
</html>
